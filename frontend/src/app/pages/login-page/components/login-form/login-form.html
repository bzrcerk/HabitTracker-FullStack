<div class="container">
  <h2 class="text-2xl">Login</h2>

  <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
    <div class="email-field w-50%">
      <input type="text" placeholder="Enter the username..." formControlName="username">

      @if (submitted && loginForm.get('username')?.hasError('required')) {
        <p>Username is required!</p>
      }
    </div>

    <div class="password-field">
      <input [type]="showPassword ? 'text' : 'password'" placeholder="Enter the password..." formControlName="password">
      <input type="checkbox" [checked]="showPassword" (change)="showPassword = !showPassword">
    </div>

    <div>
      <a routerLink="/register">Sign in now.</a>
    </div>

    <button type="submit" class="cursor-pointer" (click)="onSubmit()">Login</button>
  </form>
</div>
