<aside class="flex h-full flex-col bg-[#111629]/95 px-5 py-8 text-blue-100">
  <div class="mb-10 flex items-center gap-3">
    <span class="h-2.5 w-2.5 rounded-full bg-violet-400"></span>
    <p class="text-3xl font-bold tracking-wide">Productive</p>
  </div>

  <p class="mb-4 text-xs font-semibold uppercase tracking-[0.2em] text-blue-300/60">Menu</p>

  <nav class="space-y-2">
    <a
      routerLink="/todo"
      routerLinkActive="bg-blue-900/40 text-white"
      class="flex items-center justify-between rounded-xl px-4 py-3 text-lg text-blue-200/80 transition hover:bg-blue-900/30 hover:text-white"
    >
      <span>Todo</span>
      <span class="rounded-full bg-violet-500 px-2 py-0.5 text-xs font-semibold text-white">{{ pendingTodos }}</span>
    </a>

    <a
      routerLink="/analytics"
      routerLinkActive="bg-blue-900/40 text-white"
      class="block rounded-xl px-4 py-3 text-lg text-blue-200/80 transition hover:bg-blue-900/30 hover:text-white"
    >
      Analytics
    </a>

    <a
      routerLink="/habits"
      routerLinkActive="bg-blue-900/40 text-white"
      class="block rounded-xl px-4 py-3 text-lg text-blue-200/80 transition hover:bg-blue-900/30 hover:text-white"
    >
      Habits
    </a>
  </nav>

  <div class="mt-auto space-y-4">
    @if (isTodoRoute) {
      <p class="text-xs font-semibold uppercase tracking-[0.2em] text-blue-300/60">Categories</p>

      <ul class="space-y-3">
        @for (category of categories; track category.name) {
          <li>
            <a
              [routerLink]="'/todo'"
              [queryParams]="{ category: category.name }"
              class="flex items-center gap-3 rounded-lg px-2 py-1 text-lg text-blue-200/80 transition hover:bg-blue-900/30 hover:text-white"
              [class.bg-blue-900/40]="selectedCategory === category.name"
              [class.text-white]="selectedCategory === category.name"
            >
              <span class="h-2.5 w-2.5 rounded-full" [style.background-color]="category.color"></span>
              {{ category.name }}
            </a>
          </li>
        }
      </ul>
    }

    <button
      (click)="logout()"
      class="mt-4 w-full cursor-pointer rounded-xl border border-blue-700 bg-blue-900/60 px-4 py-3 text-base font-semibold text-blue-100 transition hover:bg-blue-800/70 focus:outline-none focus:ring-2 focus:ring-blue-400"
    >
      Logout
    </button>
  </div>
</aside>
